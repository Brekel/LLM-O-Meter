<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DA7756;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C45A3A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background (Claude orange/terracotta) -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>
  <!-- Gauge track (dark ring) -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="#00000033" stroke-width="12"/>
  <!-- Gauge arc (green, ~40% fill for visual) -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="url(#arc)" stroke-width="12"
          stroke-dasharray="95.5 238.76" stroke-dashoffset="59.69"
          stroke-linecap="round" transform="rotate(-90 64 64)"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="8" fill="#FFFFFF" opacity="0.9"/>
  <!-- Gauge needle pointing ~40% -->
  <line x1="64" y1="64" x2="64" y2="32" stroke="#FFFFFF" stroke-width="3.5"
        stroke-linecap="round" transform="rotate(144 64 64)" opacity="0.9"/>
</svg>
